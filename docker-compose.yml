version: '3.8'

services:
  # ------------------------------------------------ PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: district360_db
      POSTGRES_USER: district360_user
      POSTGRES_PASSWORD: district360_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U district360_user -d district360_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------ Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------ Flask API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://district360_user:district360_pass@postgres:5432/district360_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "5000"

  # ------------------------------------------------ Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.services.infrastructure.celery_app worker --loglevel=info --concurrency=4
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://district360_user:district360_pass@postgres:5432/district360_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ------------------------------------------------ Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.services.infrastructure.celery_app beat --loglevel=info
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://district360_user:district360_pass@postgres:5432/district360_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ------------------------------------------------ Nginx
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
